name: Update Organization Activity Graph

on:
  schedule:
    - cron: "0 0 * * *" # Автозапуск каждую ночь
  workflow_dispatch: # Кнопка ручного запуска

permissions:
  contents: write # Разрешение на пуш картинки

jobs:
  build:
    runs-on: ubuntu-latest
    name: Generate Activity SVG
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Генератор общей аналитики организации (собирает данные по всем репозиториям студии)
      - name: Generate Organization Metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.ORG_GRAPH_TOKEN }}
          user: AlexFrontEndOrg
          base: "" # Отключаем личный блок, оставляем только общую инфу
          
          # Включаем круговую диаграмму самых используемых языков во всех репозиториях организации
          plugin_languages: yes
          plugin_languages_ignored: html, css # Игнорируем разметку, чтобы видеть чистый код
          plugin_languages_details: bytes-size, percentage
          
          # Включаем красивый блок активности организации (когда команда чаще всего кодит)
          plugin_habits: yes
          plugin_habits_from: 200 # Анализируем последние 200 событий всей студии
          plugin_habits_facts: no
          plugin_habits_charts: yes
          
          config_timezone: Europe/Yerevan
          filename: profile-3d-contrib/profile-night-view.svg
          
          # Автоматический пуш силами экшена
          config_output: svg
          committer_token: ${{ secrets.ORG_GRAPH_TOKEN }}
