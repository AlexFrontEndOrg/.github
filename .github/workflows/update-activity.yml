name: Update Organization Activity Graph

on:
  schedule:
    - cron: "0 0 * * *" # Автозапуск каждую ночь
  workflow_dispatch: # Кнопка ручного запуска

permissions:
  contents: write # Разрешение на пуш картинки

jobs:
  build:
    runs-on: ubuntu-latest
    name: Generate Activity SVG
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Официальный генератор карты активности
      - name: Generate Activity Graph
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.ORG_GRAPH_TOKEN }}
          user: AlexFrontEndOrg
          base: activity, community
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year # График за последние полгода
          config_timezone: Europe/Yerevan # Твой часовой пояс
          filename: profile-3d-contrib/profile-night-view.svg # Сохраняем сразу по нужному пути
          
          # Автоматический коммит и пуш силами самого экшена
          config_output: svg
          committer_token: ${{ secrets.ORG_GRAPH_TOKEN }}
