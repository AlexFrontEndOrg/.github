name: Update Organization Activity Graph

on:
  schedule:
    - cron: "0 0 * * *" # Автозапуск каждую ночь
  workflow_dispatch: # Кнопка ручного запуска

permissions:
  contents: write # Разрешение на пуш картинки

jobs:
  build:
    runs-on: ubuntu-latest
    name: Generate Activity SVG
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Генератор расширенной аналитики организации
      - name: Generate Organization Metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.ORG_GRAPH_TOKEN }}
          user: AlexFrontEndOrg
          template: classic # Возвращаемся к стандартному стилю GitHub
          base: header
          
          # Включаем круговой график, который работает для организаций
          plugin_languages: yes
          plugin_languages_ignored: html, css
          plugin_languages_details: bytes-size, percentage
          plugin_languages_sections: most-used, recently-used-charts # Активирует круговой чарт активности
          
          config_timezone: Europe/Yerevan
          filename: profile-3d-contrib/profile-night-view.svg
          
          # Автоматический пуш силами экшена
          config_output: svg
          committer_token: ${{ secrets.ORG_GRAPH_TOKEN }}
