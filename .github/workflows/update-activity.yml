name: Update Organization Activity Graph

on:
  schedule:
    - cron: "0 0 * * *" # Автозапуск каждую ночь
  workflow_dispatch: # Кнопка ручного запуска

permissions:
  contents: write # Разрешение на пуш картинки

jobs:
  build:
    runs-on: ubuntu-latest
    name: Generate Activity SVG
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Генератор расширенной аналитики организации
      - name: Generate Organization Metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.ORG_GRAPH_TOKEN }}
          user: AlexFrontEndOrg
          base: "" # Отключаем базовый личный блок
          
          # 1. Аналитика языков (твоя текущая рабочая фича)
          plugin_languages: yes
          plugin_languages_ignored: html, css
          plugin_languages_details: bytes-size, percentage
          
          # 2. Рабочие привычки команды
          plugin_habits: yes
          plugin_habits_from: 200
          plugin_habits_facts: no
          plugin_habits_charts: yes
          
          # 3. НОВОЕ: Статус ведения проектов (Issues и PR)
          plugin_followup: yes
          plugin_followup_sections: repositories, user
          
          # 4. НОВОЕ: Общий счётчик строк кода студии
          plugin_lines: yes
          
          # 5. НОВОЕ: Интеграция с досками GitHub Projects (если используете)
          plugin_projects: yes
          plugin_projects_limit: 4
          
          config_timezone: Europe/Yerevan
          filename: profile-3d-contrib/profile-night-view.svg
          
          # Автоматический пуш силами экшена
          config_output: svg
          committer_token: ${{ secrets.ORG_GRAPH_TOKEN }}
